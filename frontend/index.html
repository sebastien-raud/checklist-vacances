<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Vacances</title>
    <link rel="stylesheet" href="lib/survey/survey.css">
    <link rel="stylesheet" href="app.css">
    <script type="module" src="lib/survey/survey.js"></script>
</head>
<body>
    <div id="app">

        <!-- Vue connexion -->
        <div id="view-login" class="view">
            <div class="login-card">
                <h1>Checklist Vacances</h1>
                <form id="form-login">
                    <div class="form-group">
                        <label for="input-login">Identifiant</label>
                        <input type="text" id="input-login" name="login" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="input-password">Mot de passe</label>
                        <input type="password" id="input-password" name="password" required autocomplete="current-password">
                    </div>
                    <p id="login-error" class="error-msg hidden"></p>
                    <button type="submit" class="btn-primary btn-full">Se connecter</button>
                </form>
            </div>
        </div>

        <!-- Vue liste des voyages -->
        <div id="view-list" class="view hidden">
            <header class="app-header">
                <h1>Mes voyages</h1>
                <button id="btn-logout" class="btn-secondary">Déconnexion</button>
            </header>
            <main class="container">
                <div id="voyages-list" class="voyages-grid"></div>
                <button id="btn-new-voyage" class="btn-primary btn-full">+ Nouveau voyage</button>
            </main>
        </div>

        <!-- Vue formulaire voyage -->
        <div id="view-voyage" class="view hidden">
            <header class="app-header">
                <button id="btn-back" class="btn-secondary">&#8592; Retour</button>
                <input type="text" id="voyage-name" placeholder="Nom du voyage" class="voyage-name-input">
                <div class="header-actions">
                    <button id="btn-delete" class="btn-danger hidden">Supprimer</button>
                </div>
            </header>
            <main class="container">
                <div id="survey-container"></div>
            </main>
        </div>

    </div>
    <script defer src="app.js"></script>
</body>
</html>
